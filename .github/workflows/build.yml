name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install WiX Toolset v3
        run: choco install wixtoolset -y --no-progress --ignore-checksums
        shell: powershell
        continue-on-error: true

      - name: Add WiX to PATH
        shell: powershell
        run: |
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (Test-Path $wixPath) {
            echo $wixPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "WiX found at: $wixPath"
          } else {
            Get-ChildItem "C:\Program Files (x86)" -Filter "WiX*" -Directory | ForEach-Object {
              $p = "$($_.FullName)\bin"
              Write-Host "Found WiX: $p"
              echo $p | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }

      - name: Verify WiX
        shell: powershell
        run: |
          $light = Get-Command light.exe -ErrorAction SilentlyContinue
          if ($light) { Write-Host "light.exe: $($light.Source)" }
          else { Write-Error "light.exe NOT found!"; exit 1 }

      - name: Build fat JAR only
        run: mvn -B clean package -DskipJpackage=true --file pom.xml
        shell: cmd

      # 将 fat JAR 拷贝到一个只含纯 ASCII 文件名的干净目录再传给 jpackage
      # 避免 target/ 下的中文资源文件（5月M1分案.xlsx）被写入 bundle.wxf 导致 LGHT0311
      - name: Prepare clean jpackage input
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path jpackage-input | Out-Null
          Copy-Item "target\java-utils-toolkit-1.0.0.jar" "jpackage-input\"
          Write-Host "Input dir contents:"
          Get-ChildItem jpackage-input

      - name: Run jpackage
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path target\dist | Out-Null
          $jpackage = "$env:JAVA_HOME\bin\jpackage.exe"
          Write-Host "Using jpackage: $jpackage"
          & $jpackage `
            --input jpackage-input `
            --name JavaUtilsToolkit `
            --main-jar java-utils-toolkit-1.0.0.jar `
            --main-class com.toolkit.Launcher `
            --type exe `
            --icon src\main\resources\icon.ico `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --app-version 1.0.0 `
            --vendor "Toolkit" `
            --description "Java Utils Toolkit" `
            --copyright "Toolkit" `
            --java-options "-Xmx512m" `
            --dest target\dist `
            --verbose
          if ($LASTEXITCODE -ne 0) {
            Write-Error "jpackage failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: target/dist/*.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build-windows ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows exe
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
