name: Build Installers

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'          # 打 v1.0.0 这种 tag 时自动发布 Release
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # 支持手动触发

jobs:
  # ==================== macOS 打包 ====================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build fat JAR + jpackage dmg
        run: mvn -B clean package --file pom.xml

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: target/dist/*.dmg
          if-no-files-found: warn

  # ==================== Windows 打包 ====================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # jpackage (JDK 21) 内部依赖 WiX v3 的 light.exe/candle.exe
      - name: Install WiX Toolset v3
        run: choco install wixtoolset -y --no-progress --ignore-checksums
        shell: powershell
        continue-on-error: true   # 已安装则跳过，不中断流程

      # 将 WiX v3 加入 PATH
      - name: Add WiX to PATH
        shell: powershell
        run: |
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (Test-Path $wixPath) {
            echo $wixPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "WiX found at: $wixPath"
          } else {
            Write-Host "WiX not found at expected path, searching..."
            Get-ChildItem "C:\Program Files (x86)" -Filter "WiX*" -Directory | ForEach-Object {
              $p = "$($_.FullName)\bin"
              Write-Host "Found: $p"
              echo $p | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }

      # 验证 light.exe 可用
      - name: Verify WiX
        shell: powershell
        run: |
          $light = Get-Command light.exe -ErrorAction SilentlyContinue
          if ($light) { Write-Host "light.exe found: $($light.Source)" }
          else { Write-Error "light.exe NOT found in PATH!"; exit 1 }

      # Step 1: 只打 fat JAR，跳过 Maven 里的 jpackage
      - name: Build fat JAR (skip jpackage)
        run: mvn -B clean package -DskipJpackage=true --file pom.xml
        shell: cmd

      # Step 2: 直接调用 jpackage
      - name: Run jpackage
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path target\dist | Out-Null
          $jpackage = "$env:JAVA_HOME\bin\jpackage.exe"
          Write-Host "Using jpackage: $jpackage"
          # 所有参数必须纯 ASCII，否则 WiX light.exe codepage 1252 会失败
          & $jpackage `
            --input target `
            --name JavaUtilsToolkit `
            --main-jar java-utils-toolkit-1.0.0.jar `
            --main-class com.toolkit.Launcher `
            --type exe `
            --icon src\main\resources\icon.ico `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --app-version 1.0.0 `
            --vendor "Toolkit" `
            --description "Java Utils Toolkit" `
            --copyright "Toolkit" `
            --java-options "-Xmx512m" `
            --dest target\dist `
            --verbose
          if ($LASTEXITCODE -ne 0) {
            Write-Error "jpackage failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: target/dist/*.exe
          if-no-files-found: warn

  # ==================== 发布 GitHub Release（仅打 tag 时执行） ====================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build-macos, build-windows ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS dmg
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist/

      - name: Download Windows exe
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
