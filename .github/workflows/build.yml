name: Build Installers

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'          # 打 v1.0.0 这种 tag 时自动发布 Release
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # 支持手动触发

jobs:
  # ==================== macOS 打包 ====================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build fat JAR + jpackage dmg
        run: mvn -B clean package --file pom.xml

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: target/dist/*.dmg
          if-no-files-found: warn

  # ==================== Windows 打包 ====================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # jpackage 生成 .exe 需要 WiX Toolset
      - name: Install WiX Toolset
        run: choco install wixtoolset -y
        shell: powershell

      - name: Refresh PATH (WiX)
        run: echo "$env:ProgramFiles\WiX Toolset v3.14\bin" >> $env:GITHUB_PATH
        shell: powershell

      - name: Build fat JAR + jpackage exe
        run: mvn -B clean package --file pom.xml
        shell: cmd

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: target/dist/*.exe
          if-no-files-found: warn

  # ==================== 发布 GitHub Release（仅打 tag 时执行） ====================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build-macos, build-windows ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS dmg
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist/

      - name: Download Windows exe
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
